<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanauta Lab.式 お仕事タイプ診断 | 2分で見つかる自分のトリセツ</title>
<meta name="description" content="Hanauta Lab.（ハナウタラボ）のお仕事タイプ診断。2分で見つかる、自分のトリセツ。働き方にも、似合うものがある。8タイプから、あなたに合うお仕事を見つけましょう。">

<!-- OGP（SNSシェア用）-->
<meta property="og:title" content="Hanauta Lab.式 お仕事タイプ診断">
<meta property="og:description" content="2分で見つかる、自分のトリセツ。働き方にも、似合うものがある。13の質問であなたに合うお仕事タイプを見つけませんか？">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kaorisatsuki.github.io/hanauta-lab-aptitude/">
<meta property="og:image" content="https://kaorisatsuki.github.io/hanauta-lab-aptitude/images/ogp.png">
<meta name="twitter:card" content="summary_large_image">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <header class="header">
    <p class="brand">HANAUTA LAB.</p>
    <p class="logo">ハナウタラボ</p>
  </header>

  <!-- ===== イントロ画面 ===== -->
  <section id="screen-intro" class="screen intro active">
    <img src="images/top-hero.png" alt="Hanauta Lab. お仕事タイプ診断" class="hero-image">
    <p class="tagline-top">2分で見つかる、自分のトリセツ</p>
    <h1>Hanauta Lab.式<br>お仕事タイプ診断</h1>
    <p class="tagline-bottom">働き方にも、似合うものがある。</p>
    <div class="meta">
      全13問・8タイプ診断
    </div>
    <button id="start-btn" class="btn-primary">はじめる</button>
  </section>

  <!-- ===== 質問画面 ===== -->
  <section id="screen-question" class="screen question-screen">
    <div class="progress">
      <div class="progress-track">
        <div id="progress-bar" class="progress-fill"></div>
      </div>
      <p id="progress-text" class="progress-text">Question 1 / 13</p>
    </div>
    <h2 id="question-text" class="question-text"></h2>
    <div id="options-container" class="options"></div>
  </section>

  <!-- ===== 結果画面 ===== -->
  <section id="screen-result" class="screen result-screen">

    <div class="result-card">
      <p class="result-label">あなたのタイプは</p>
      <div id="result-emoji" class="result-emoji"></div>
      <h2 id="result-name" class="result-name"></h2>
      <p id="result-catchphrase" class="result-catchphrase"></p>
      <p id="result-description" class="result-description"></p>
    </div>

    <div class="section-card">
      <h3>🌿 向いている作業</h3>
      <ul id="result-works" class="works-list"></ul>
      <div class="related-works">
        <strong>RELATED WORKS</strong>
        <span id="result-related"></span>
      </div>
    </div>

    <div class="message-card">
      <p id="result-message"></p>
    </div>

    <div class="line-section">
      <p>気になったら<br>そっと声をかけてください。<br>LINEで見学のご相談を受けつけています。</p>
      <a id="line-btn" class="btn-line" href="#" target="_blank" rel="noopener">LINEで相談する</a>
    </div>

    <div class="share-section">
      <h3>診断結果をシェアする</h3>
      <div class="share-buttons">
        <a id="share-x" class="share-btn" href="#" target="_blank" rel="noopener">𝕏 でシェア</a>
        <a id="share-line" class="share-btn" href="#" target="_blank" rel="noopener">LINEで送る</a>
        <button id="copy-text" class="share-btn" data-share="">テキストをコピー</button>
      </div>
    </div>

    <div class="retry-section">
      <button id="retry-btn" class="btn-retry">もう一度診断する</button>
    </div>

  </section>

  <footer class="footer">
    <p>Hanauta Lab. ハナウタラボ<br>
    運営：ハレビジン合同会社</p>
  </footer>

</div>

<script src="js/types.js"></script>
<script src="js/questions.js"></script>
<script src="js/script.js"></script>
</body>
</html>
